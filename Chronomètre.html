<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrnometre</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        table{
            border-collapse:collapse;
            margin-bottom:20px;
        }
        td{
            border:4px double black;
            margin-right: 50px;
        }
        body{
            display:flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-size:cover;
            /* background-image: linear-gradient(red, yellow);
            height: 100vh; */
        }
        #cadre{
            width:19%;
            height: 20%;
            margin-bottom: 20px;
            border-radius: 30px;
            margin-top:20px;
            border:4px double black;
        }
        #heures{
            margin-left:35px;
        }
        #heures,#minutes{
            font-size: 3.2em;
            text-align: center;
            color:black;
        }
        #secondes{
            font-size: 3.2em;
            text-align: center;
            color:black;
        }
        span{
            font-size: 50px;
            color: black;
        }
        #boutons{
            display: flex;
        }
        #btn1,#btn4{
            background-color: red;
            color:black;
        }
        #btn1,#btn2,#btn3,#btn4{
            margin-right: 25px;
            padding: 3px;
            border-radius:30px ;
            width: 100px;
            
            border:4px double black;
        }

        #cad>span{
           width:100px;
           height:100px; 
           display: inline-block;
           vertical-align: top;
           font-size: 1.2em;
           text-align: center;
        }

        #cad{
            margin-top:20px;
        }
        #gag{
            background-color: black;
        }

        #millisecondes{
            font-size:1.9em;
        }
        #point{
            font-size: 2.3em;
        }
    </style>
</head>
<body>
    
       <!--<div id="cadre">
            <div id="heures">00</div><span>:</span> 
            <div id="minutes">00</div><span>:</span> 
            <div><span id="secondes">00.</span><span id="millisecondes">00</span></div>
        </div>-->

        <div id="cadre">
            <span id="heures">00</span><span>:</span>
            <span id="minutes">00</span><span>:</span>
            <span id="secondes">00</span><span id="point">.</span>
            <span id="millisecondes">00</span>
        </div>

        <div id="boutons">
            <button id="btn1" type="button">Start</button>
            <button id="btn4" type="button">Stop</button>
            <button id="btn2" type="button">Reset</button>
            <button id="btn3" type="button">Save</button>
        </div>
   
    <div id="cad"></div>
    
    <script>
        let ap = 0;
        let k = 0;
        let m = 0;
        let n = 0;
        let o = 0;
        let z = document.getElementById("millisecondes");
        let a = document.getElementById("heures");
        let b = document.getElementById("minutes");
        let c = document.getElementById("secondes");
        let d = document.getElementById("btn1");
        let e = document.getElementById("btn2");
        let p = document.getElementById("btn3");
        let ob = document.getElementById("btn4");
        let v = document.getElementById("cad");
        let x = 0;
        let g = 0;
        let i = 0;
        var table = new Array();
        var tr = new Array();
        var td = new Array();
        var span1 = new Array();
        var span2 = new Array();
        let mo = 0;
        let tf = 0;
        let count = 0;
        var bcb = new Array();
        function supprimer(mo){
            count--;
            table[i].removeChild(tr[mo]);
            if(count==0)
                {
                    table[i].removeChild(tr[0]);tf = 1;
                }
        }
        
        let fa = 0;
        let ha = 0;
        
        e.addEventListener("click",function(){
            c.textContent = "00";
            b.textContent = "00";
            a.textContent = "00";
            z.textContent = "00";
            d.disabled = false;
            btn1.textContent = "Start";
            ap = 0;
            clearTimeout(x);
            d.style.backgroundColor = 'red';
            v.removeChild(table[i]);
            fa = 0;
            tf = 1;
            if(count>0)
                count=0;
        });

        p.addEventListener('click',function(){
            if(fa == 0)
                {
                    table[i] = document.createElement("table");
                }
            tr[k] = document.createElement("tr");
            tr[k+1] = document.createElement("tr");
            td[m] = document.createElement("td");
            td[m+1] = document.createElement("td");
            td[m+2] = document.createElement("td");
            td[m+3] = document.createElement("td");
            let fg = document.createElement("td"); 
            span1[n] = document.createElement("span");
            span1[n+1] = document.createElement("span");
            span1[n+2] = document.createElement("span");
            span2[o] = document.createElement("span");
            span2[o+1] = document.createElement("span");
            span2[o+2] = document.createElement("span");
            if (ha == 0)
                {   
                    table[i].appendChild(tr[0]);
                    tr[0].appendChild(td[m]);
                    tr[0].appendChild(td[m+1]);
                }

            if(tf == 1)
            {
                table[i].appendChild(tr[0]);
                /*tr[0].appendChild(td[m]);
                tr[0].appendChild(td[m+1]);*/
                tf = 0;
            }
            ha = 1;

            table[i].appendChild(tr[k+1]);
            
            
            tr[k+1].appendChild(td[m+2]);
            tr[k+1].appendChild(td[m+3]);
            mo = k+1 ;
            tr[k+1].appendChild(fg);
            fg.innerHTML ="<button style=\"position:relative;padding:10px;font-size:20px;height:75px;\" onclick=\"supprimer("+mo+")\" id=\"btnn\" type=\"button\"> X </button> ";

            td[0].textContent = "Durée";
            td[1].textContent = "Heure";
            td[0].style.fontSize = '2.2em';
            td[0].style.textAlign = 'center';
            td[1].style.fontSize = '2.2em';
            td[1].style.textAlign = 'center'; 


            td[m+2].appendChild(span1[n]);
            td[m+2].appendChild(span1[n+1]);
            td[m+2].appendChild(span1[n+2]);
            
            td[m+3].appendChild(span2[o]);
            td[m+3].appendChild(span2[o+1]);
            td[m+3].appendChild(span2[o+2]);

            count++;

            span1[n].innerHTML = a.textContent + ":";
            span1[n+1].innerHTML = b.textContent + ":";
            span1[n+2].innerHTML = c.textContent;

            let da = new Date();
            
            if (da.getHours()<10)
                span2[o].textContent = "0" + da.getHours() + ":";
            else 
                span2[o].textContent = da.getHours()+ ":";
            if (da.getMinutes()<10)
                span2[o+1].textContent = "0" + da.getMinutes()+ ":";
            else 
                span2[o+1].textContent = da.getMinutes()+ ":";
            if (da.getSeconds()<10)
                span2[o+2].textContent = "0" + da.getSeconds();
            else 
                span2[o+2].textContent = da.getSeconds();

            k=k+2;
            m=m+4;
            n=n+3;
            o=o+3;
            
            if (fa == 0)
                {
                    v.appendChild(table[i]);
                    fa = 1;
                }
            
        });

        function chronometre(){
            d.disabled = true;
            if(parseInt(a.textContent)==24){
                clearInterval(x);
                g = 1;
            }

            if(parseInt(z.textContent)<9 && g == 0)
                    z.textContent = "0" + ((parseInt(z.textContent)) + 1);

            if(parseInt(z.textContent)>=9 && g == 0)
                    z.textContent = (parseInt(z.textContent)) + 1;
               

            if(parseInt(z.textContent)==100 && g == 0){
                z.textContent = "00";
                if(parseInt(c.textContent)<9 && g == 0)
                c.textContent = "0" + (parseInt(c.textContent) + 1);
                else
                {
                    if(g == 0)
                        c.textContent = parseInt(c.textContent) + 1;
                }
            }

            if (parseInt(c.textContent) == 60 && g == 0)
            {
                c.textContent = "00";
                if(parseInt(b.textContent)<9)
                    b.textContent = "0" + (parseInt(b.textContent) + 1);
                else
                    b.textContent = parseInt(b.textContent) + 1;
            }

            if (parseInt(b.textContent) == 60 && g == 0)
            {
                b.textContent = "00";
                if(parseInt(a.textContent)<9)
                    a.textContent = "0" + (parseInt(a.textContent) + 1);
                else
                    a.textContent = parseInt(a.textContent) + 1;}
            
            x = setTimeout("chronometre()",10);
        } 
        
        d.addEventListener("click",function(){
            chronometre()
            ap = 1;     
        });

        ob.addEventListener("click",function(){
            if(ap==1){
                clearTimeout(x);
                d.disabled = false;
                d.textContent = "Continue";
                d.style.color = 'white';
                d.style.backgroundColor = 'green';
            }
        });
        
    </script>

</body>
</html>
